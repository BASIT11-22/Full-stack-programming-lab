<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Lab 1: Dynamic List Manager — add and delete animated list items with jQuery." />
    <title>Lab 1 · Dynamic List Manager | jQuery Labs</title>
    <link rel="stylesheet" href="../css/style.css" />
    <style>
        /* ── Lab 1 specific ── */
        .input-row {
            display: flex;
            gap: 0.75rem;
            margin-bottom: 1.5rem;
        }

        .input-row .form-control {
            flex: 1;
        }

        #item-list {
            list-style: none;
            display: flex;
            flex-direction: column;
            gap: 0.6rem;
        }

        .list-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 0.75rem 1rem;
            transition: background var(--transition), border-color var(--transition);
            cursor: default;
        }

        /* Hover highlight */
        .list-item:hover {
            background: rgba(108, 99, 255, 0.1);
            border-color: rgba(108, 99, 255, 0.45);
        }

        .list-item-text {
            display: flex;
            align-items: center;
            gap: 0.65rem;
            font-size: 0.95rem;
            color: var(--text);
        }

        .list-item-text::before {
            content: '';
            width: 8px;
            height: 8px;
            background: var(--primary);
            border-radius: 50%;
            flex-shrink: 0;
        }

        .item-count {
            display: inline-block;
            background: rgba(108, 99, 255, 0.15);
            color: var(--primary);
            font-size: 0.78rem;
            font-weight: 700;
            padding: 0.15rem 0.55rem;
            border-radius: 99px;
            margin-left: 0.5rem;
        }

        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
        }

        .empty-state .icon {
            font-size: 2.5rem;
            margin-bottom: 0.75rem;
        }
    </style>
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <a href="../index.html" class="navbar-brand"><span>$</span>jQuery Labs</a>
            <a href="../index.html" class="back-btn">← Back to Labs</a>
        </div>
    </nav>

    <!-- Header -->
    <header class="page-header">
        <div class="container">
            <div class="badge">Lab 01</div>
            <h1>📝 Dynamic List Manager</h1>
            <p>Add items, remove with animation, and hover to highlight.</p>
        </div>
    </header>

    <!-- Workspace -->
    <main class="lab-workspace">
        <div class="container">
            <div class="lab-panel">
                <div class="lab-panel-header">
                    <div class="lab-icon">📝</div>
                    <div>
                        <h3>List Manager</h3>
                        <p style="font-size:0.82rem; margin:0;">Items: <span id="count-badge"
                                class="item-count">0</span></p>
                    </div>
                </div>

                <div class="lab-panel-body">

                    <!-- Input Row -->
                    <div class="input-row">
                        <input type="text" id="item-input" class="form-control"
                            placeholder="Type a new item and press Add or Enter…" maxlength="80" />
                        <button id="add-btn" class="btn btn-primary">＋ Add</button>
                    </div>

                    <!-- List -->
                    <ul id="item-list">
                        <!-- Items rendered by JS -->
                    </ul>

                    <!-- Empty state (shown when list is empty) -->
                    <div id="empty-state" class="empty-state">
                        <div class="icon">🗒️</div>
                        <p>No items yet. Add your first item above!</p>
                    </div>

                </div><!-- /body -->
            </div><!-- /panel -->
        </div>
    </main>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>Lab 01 · Dynamic List Manager · Abdul Basit (232001)</p>
        </div>
    </footer>

    <!-- jQuery CDN -->
    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="../js/common.js"></script>
    <script>
        /*
         * Lab 1 — Dynamic List Manager
         * ─────────────────────────────
         * Demonstrates:
         *   • DOM manipulation  (append, remove, text)
         *   • Event handling    (click, keypress)
         *   • CSS manipulation  (addClass, removeClass, hover)
         *   • jQuery animations (slideDown, slideUp)
         */
        $(function () {
            'use strict';

            /* ── State ── */
            let itemCount = 0;   // total items ever added (used for unique IDs)
            let listSize = 0;   // current visible items

            /* ── Helpers ── */

            /**
             * Refresh the count badge and toggle the empty-state panel.
             */
            function refreshUI() {
                $('#count-badge').text(listSize);
                if (listSize === 0) {
                    $('#empty-state').fadeIn(250);
                } else {
                    $('#empty-state').hide();
                }
            }

            /**
             * Build and return a new <li> jQuery element.
             * @param {string} text - The item label
             * @param {number} id   - Unique numeric ID
             */
            function buildListItem(text, id) {
                const $li = $('<li>', {
                    class: 'list-item',
                    id: 'item-' + id
                });

                const $label = $('<span>', { class: 'list-item-text', text: text });

                const $deleteBtn = $('<button>', {
                    class: 'btn btn-danger btn-sm',
                    text: '✕ Delete',
                    'data-id': id
                });

                $li.append($label, $deleteBtn);
                return $li;
            }

            /**
             * Add a new item to the list.
             */
            function addItem() {
                /* Trim whitespace */
                const rawText = $('#item-input').val().trim();

                /* Prevent empty submission */
                if (!rawText) {
                    $('#item-input')
                        .addClass('is-invalid')
                        .attr('placeholder', 'Please type something first!');

                    setTimeout(function () {
                        $('#item-input')
                            .removeClass('is-invalid')
                            .attr('placeholder', 'Type a new item and press Add or Enter…');
                    }, 1800);

                    showToast('Item cannot be empty!', 'error');
                    return;
                }

                itemCount++;
                listSize++;

                const $newItem = buildListItem(rawText, itemCount);

                /* Hide initially, then slide in */
                $newItem.hide();
                $('#item-list').append($newItem);
                $newItem.slideDown(320);

                /* Clear input */
                $('#item-input').val('').focus();

                refreshUI();
                showToast('Item added!', 'success');
            }

            /* ── Event: Add button ── */
            $('#add-btn').on('click', addItem);

            /* ── Event: Enter key in input ── */
            $('#item-input').on('keypress', function (e) {
                if (e.key === 'Enter' || e.which === 13) addItem();
            });

            /* ── Event: Delete button (delegated to parent) ── */
            $('#item-list').on('click', '.btn-danger', function () {
                const $btn = $(this);
                const $item = $btn.closest('.list-item');

                /* Slide out, then remove DOM node */
                $item.slideUp(350, function () {
                    $(this).remove();
                    listSize--;
                    refreshUI();
                });

                showToast('Item removed.', 'info');
            });

            /* ── Initial UI state ── */
            refreshUI();
        });
    </script>
</body>

</html>
